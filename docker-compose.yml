services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=orders.settings
    depends_on:
      - redis
    networks:
      - app-network

  celery:
    build: .
    command: celery -A orders worker --loglevel=info -P solo
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=orders.settings
    depends_on:
      - redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge